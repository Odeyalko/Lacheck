<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чек-лист ПВЗ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Иконки -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Библиотека для PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Times New Roman"', 'Times', 'serif'],
                    },
                    colors: {
                        lamoda: '#9cc3ff',
                        lamodaDark: '#7ab0f5'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Times New Roman', serif; }
        .btn-press:active { transform: scale(0.98); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pdf-item {
            break-inside: avoid;
            page-break-inside: avoid;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .pdf-content {
            background: white;
            padding: 20px;
            font-family: 'Times New Roman', serif;
            color: #000;
        }
    </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col">

    <!-- Шапка -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-gray-100 px-4 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold italic tracking-tighter text-black cursor-pointer" onclick="goHome()">LAMODA CHECK</h1>
        <button onclick="toggleView()" class="text-sm font-bold uppercase tracking-widest hover:text-lamoda transition-colors flex items-center gap-2">
            <span id="view-btn-text">История</span>
            <i data-lucide="history" class="w-4 h-4"></i>
        </button>
    </header>

    <!-- Основной контент -->
    <main class="flex-grow max-w-2xl mx-auto w-full p-4 pb-24" id="app-container">
        <!-- Рендеринг через JS -->
    </main>

    <script>
        // --- ДАННЫЕ (26 пунктов, subItems только для справки) ---
        const checklistData = [
            { id: '1', text: 'Сотрудники прибывают на рабочее место до открытия ПВЗ' },
            { id: '2', text: 'Паки и товары рассортированы на стеллажи/короба. Сотрудники не кидают/пачкают паки и товары, не хранят на полу (допустимо на подложке)' },
            { id: '3', text: 'Соблюдаются требования по срокам отправки, сортировке и маркировке возвратных коробов. Этикетки корректны' },
            { id: '4', text: 'Сотрудники приветствуют и уточняют цель визита' },
            { id: '5', text: 'Сотрудники используют скрипт о качестве товаров до примерки (Очередь менее 3-х человек на 1 сотрудника)' },
            { id: '6', text: 'Сотрудники озвучивают клиенту условия и стоимость доставки до выдачи заказа' },
            { id: '7', text: 'Сотрудники соблюдают правила коммуникации с клиентами, не используют запрещенные фразы. Умеют отработать возражения и справиться с конфликтом, извиниться за проблемы. Своевременно реагируют на клиента' },
            { id: '8', text: 'Паки вскрываются без риска причинения вреда товару, сотрудники перед выдачей сверяют кол-во товаров с Express, открывают непрозрачную упаковку. Товары дороже 10 тыс. руб., премиальные бренды достают из упаковки, сверяют артикул на бирке и товар с Express. При выдаче на примерку учитывается группа товаров' },
            { id: '9', text: 'Сотрудники проверяют при клиенте отказные товары на наличие брака и соответствие с Express, полностью открывают коробки и всю непрозрачную упаковку, черные и белые вещи. Товары дороже 10 тыс. руб., премиальные бренды достают из упаковки, сверяют артикул на бирке и товар с Express' },
            { id: '10', text: 'Сотрудники используют скрипт о качестве товаров во время работы с отказами (Очередь менее 3-х человек на 1 сотрудника)' },
            { id: '11', text: 'Сотрудники предлагают клиенту оплату через СБП (если применимо)' },
            { id: '12', text: 'Все несоответствия с товарами зафиксированы по процедуре (эл. акт, форма информирования). Сотрудники корректно заполняют акты, завершают в день создания акта' },
            { id: '13', text: 'Сотрудники принимают оплату согласно инструкции, пересчитывают купюры и проверяют на детекторе (от 1000 руб. при неисправности/отсутствии детектора, производят визуальный осмотр купюры, сверяясь с памяткой), озвучивают вслух сумму. Выдают сдачу' },
            { id: '14', text: 'Сотрудники предлагают брендовый пакет клиенту, упаковывают товар в пакет' },
            { id: '15', text: 'Сотрудники информируют клиента об оценке сервиса по скрипту' },
            { id: '16', text: 'Сотрудники производят выдачу заказов до конца рабочего дня. Запрещено отказывать клиенту в обслуживании до закрытия пункта выдачи' },
            { id: '17', text: 'Соблюдаются правила работы с онлайн-возвратами. Отсутствуют открытые и зависшие в статусе «на экспертизу» онлайн-заявления' },
            { id: '18', text: 'Все заказы последнего дня хранения отменены. Заказы в статусах «отменен», «расформировывается» не хранятся на ПВЗ более 24 часов' },
            { id: '19', text: 'Внешний вид сотрудников соответствует стандартам' },
            { id: '20', text: 'Сотрудники закрывают пункт выдачи на перерыв в соответствии с правилами. Табличка с информацией о перерыве соответствует стандартам. Если на смене 2 и более сотрудников, то закрываться на перерыв запрещено' },
            { id: '21', text: 'Музыкальное сопровождение и видеоряд (при наличии телевизора) соответствует плейлисту Lamoda. Музыка не заглушает звук с камер' },
            { id: '22', text: 'Поддерживается чистота входной группы: дверей, окон с внутренней стороны, стеклянных перегородок, крыльца и прочее' },
            { id: '23', text: 'Поддерживается чистота торгового зала, отсутствуют видимые устранимые загрязнения: освещение, пол, потолок, стены, окна, двери и прочее' },
            { id: '24', text: 'Поддерживается чистота в подсобном помещении' },
            { 
                id: '25', 
                text: 'Сотрудники соблюдают стандарты безопасности',
                violations: [
                    'Выдают заказ, оформляют возврат самим себе',
                    'Производят манипуляции с заказом/паком/позициями (вскрытие, примерка) во время хранения заказа на ПВЗ',
                    'Покидают ПВЗ, оставляя помещение открытым',
                    'В служебных помещениях отсутствуют посторонние (в т.ч. сотрудники выходного дня)'
                ]
            },
            { 
                id: '26', 
                text: 'Сотрудники соблюдают требования ОТ и ПБ. Курят в специально отведенных местах',
                violations: [
                    'Хранят ключи в микроволновке',
                    'Качаются на стуле',
                    'Принимают пищу и жидкости на рабочих местах (за стойкой)',
                    'Используют поврежденные электроприборы',
                    'Встают, сидят, прыгают, качаются на предметах не предназначенных для этого',
                    'Небезопасное использование канцелярских предметов (фиксируют лезвие безопасного канцелярского ножа скотчем)',
                    'Используют объекты не по назначению'
                ]
            },
        ];

        // --- СОСТОЯНИЕ ---
        let currentView = 'form';
        let viewingDetailsId = null;
        
        let pvzName = '';
        let employeeName = '';
        let responses = {}; 
        
        let draftWasRestored = false;
        let historyData = JSON.parse(localStorage.getItem('lamoda_checklists')) || [];
        const DRAFT_KEY = 'lamoda_draft';

        document.addEventListener('DOMContentLoaded', () => {
            loadDraft();
            lucide.createIcons();
            render();
        });

        // --- АВТОСОХРАНЕНИЕ ---
        function saveDraft() {
            const draft = {
                pvzName,
                employeeName,
                responses,
                timestamp: Date.now()
            };
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        }

        function loadDraft() {
            const draftJson = localStorage.getItem(DRAFT_KEY);
            if (draftJson) {
                const draft = JSON.parse(draftJson);
                if (draft.pvzName || draft.employeeName || (draft.responses && Object.keys(draft.responses).length > 0)) {
                    pvzName = draft.pvzName || '';
                    employeeName = draft.employeeName || '';
                    responses = draft.responses || {};
                    draftWasRestored = true;
                }
            }
        }

        function clearDraft() {
            localStorage.removeItem(DRAFT_KEY);
            pvzName = '';
            employeeName = '';
            responses = {};
            draftWasRestored = false;
            render();
        }

        // --- НАВИГАЦИЯ ---
        function goHome() {
            currentView = 'form';
            viewingDetailsId = null;
            render();
        }

        function toggleView() {
            if (currentView === 'form') {
                currentView = 'history';
            } else {
                currentView = 'form';
                viewingDetailsId = null;
            }
            render();
        }

        function openDetails(id) {
            viewingDetailsId = id;
            currentView = 'details';
            render();
        }

        // --- РЕНДЕРИНГ ---
        function render() {
            const container = document.getElementById('app-container');
            const btnText = document.getElementById('view-btn-text');
            
            container.innerHTML = ''; 

            if (currentView === 'form') {
                btnText.innerText = 'История';
                container.innerHTML = renderForm();
            } else if (currentView === 'history') {
                btnText.innerText = 'Новая проверка';
                container.innerHTML = renderHistory();
            } else if (currentView === 'details') {
                btnText.innerText = 'Назад';
                container.innerHTML = renderDetails();
            }
            
            lucide.createIcons();
        }

        // --- ПОДСЧЕТ ПРОЦЕНТОВ (26 пунктов с равным весом) ---
        function calculateScore(responsesObj) {
            const totalQuestions = checklistData.length; // 26
            let noCount = 0;
            
            checklistData.forEach(item => {
                const resp = responsesObj[item.id];
                if (resp && resp.answer === 'no') noCount++;
            });
            
            if (totalQuestions === 0) return 100;
            
            const score = 100 - (noCount / totalQuestions * 100);
            return Math.max(0, Math.round(score));
        }

        // --- ФОРМА ПРОВЕРКИ ---
        function renderForm() {
            const percentage = calculateScore(responses);
            
            let progressColor = 'bg-green-500';
            if (percentage < 80) progressColor = 'bg-yellow-500';
            if (percentage < 50) progressColor = 'bg-red-500';

            let noCount = 0;
            checklistData.forEach(item => {
                if (responses[item.id]?.answer === 'no') noCount++;
            });

            let html = `
                <div class="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-bold uppercase tracking-widest text-gray-500">Качество (100% - нарушения)</span>
                        <span class="text-2xl font-bold italic ${percentage < 50 ? 'text-red-500' : 'text-green-600'}">${percentage}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                        <div class="${progressColor} h-4 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-right">${noCount} нарушений из ${checklistData.length} пунктов</p>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-100 shadow-sm space-y-4 mb-6 relative">
                    ${draftWasRestored ? `
                        <div class="absolute -top-3 left-4 bg-lamoda text-black text-xs font-bold px-2 py-1 rounded shadow">
                            Черновик восстановлен
                        </div>
                    ` : ''}
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-1">Название ПВЗ</label>
                        <input type="text" id="pvz-input" value="${pvzName}" oninput="updateMeta('pvzName', this.value)" class="w-full p-3 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-lamoda font-serif transition-all" placeholder="Например: ПВЗ Москва, Ленина 1">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-1">ФИО Сотрудника</label>
                        <input type="text" id="emp-input" value="${employeeName}" oninput="updateMeta('employeeName', this.value)" class="w-full p-3 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-lamoda font-serif transition-all" placeholder="Иванов Иван Иванович">
                    </div>
                    ${draftWasRestored ? `
                        <button onclick="clearDraft()" class="text-xs text-red-500 underline mt-2">Очистить черновик и начать заново</button>
                    ` : ''}
                </div>

                <div class="space-y-6 fade-in">
            `;

            checklistData.forEach(item => {
                const resp = responses[item.id] || { answer: null, comment: '' };
                
                html += `
                    <div class="group">
                        <div class="flex items-start gap-4 mb-2">
                            <div class="flex-1">
                                <p class="text-lg leading-relaxed font-serif text-gray-800">${item.text}</p>
                                ${item.violations ? `
                                    <div class="mt-3 pl-4 border-l-2 border-lamoda bg-red-50 p-3 rounded-r-lg">
                                        <p class="text-xs font-bold uppercase tracking-widest text-red-600 mb-2">Перечень нарушений:</p>
                                        <ul class="space-y-1">
                                            ${item.violations.map((v, i) => `
                                                <li class="text-sm text-red-700 italic">${i + 1}. ${v}</li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="mt-4 bg-white border border-gray-100 rounded-xl p-4 shadow-sm space-y-4">
                            <div class="flex justify-between bg-gray-50 p-1 rounded-lg">
                                <button onclick="setAnswer('${item.id}', 'yes')" class="flex-1 py-2 rounded-md text-sm font-bold transition-all flex items-center justify-center gap-2 ${resp.answer === 'yes' ? 'bg-green-100 text-green-800' : 'text-gray-400 hover:bg-gray-100'}">
                                    <i data-lucide="check" class="w-4 h-4"></i> <span class="uppercase text-xs">Да</span>
                                </button>
                                <button onclick="setAnswer('${item.id}', 'no')" class="flex-1 py-2 rounded-md text-sm font-bold transition-all flex items-center justify-center gap-2 ${resp.answer === 'no' ? 'bg-red-100 text-red-800' : 'text-gray-400 hover:bg-gray-100'}">
                                    <i data-lucide="x" class="w-4 h-4"></i> <span class="uppercase text-xs">Нет</span>
                                </button>
                                <button onclick="setAnswer('${item.id}', 'na')" class="flex-1 py-2 rounded-md text-sm font-bold transition-all flex items-center justify-center gap-2 ${resp.answer === 'na' ? 'bg-gray-200 text-gray-700' : 'text-gray-400 hover:bg-gray-100'}">
                                    <i data-lucide="minus" class="w-4 h-4"></i> <span class="uppercase text-xs">Н/Д</span>
                                </button>
                            </div>

                            <div class="space-y-3">
                                <textarea placeholder="Комментарий (необязательно)" oninput="setComment('${item.id}', this.value)" class="w-full p-3 text-sm bg-gray-50 border border-transparent rounded-lg focus:bg-white focus:border-lamoda focus:outline-none resize-none h-20 transition-all">${resp.comment || ''}</textarea>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <button onclick="saveChecklist()" class="w-full py-4 bg-black text-white font-bold italic text-lg rounded-xl shadow-lg hover:bg-lamoda hover:text-black transition-all transform active:scale-95 flex items-center justify-center gap-2 btn-press mt-8">
                        <i data-lucide="save" class="w-5 h-5"></i> Завершить чек-лист
                    </button>
                </div>
            `;
            return html;
        }

        // --- ИСТОРИЯ ---
        function renderHistory() {
            if (historyData.length === 0) {
                return `
                    <div class="text-center py-20 text-gray-400 fade-in">
                        <i data-lucide="history" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p>Пока нет сохраненных проверок</p>
                    </div>
                `;
            }

            let html = `<h2 class="text-2xl font-bold italic mb-6">История проверок</h2><div class="space-y-4 fade-in">`;
            
            historyData.forEach(list => {
                const score = calculateScore(list.responses);
                const scoreColor = score < 50 ? 'text-red-500' : score < 80 ? 'text-yellow-600' : 'text-green-600';

                html += `
                    <div class="bg-white border border-gray-100 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg">${list.pvzName}</h3>
                                <p class="text-sm text-gray-500 italic">${list.employeeName}</p>
                            </div>
                            <div class="text-right">
                                <span class="block text-xs font-mono bg-gray-100 px-2 py-1 rounded mb-1">${list.date}</span>
                                <span class="text-xs font-bold ${scoreColor}">Результат: ${score}%</span>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button onclick="openDetails('${list.id}')" class="flex-1 py-2 bg-gray-100 text-black text-sm font-bold rounded-lg flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors">
                                <i data-lucide="eye" class="w-4 h-4"></i> Открыть
                            </button>
                            <button onclick="exportPDF('${list.id}')" class="flex-1 py-2 bg-lamoda text-black text-sm font-bold rounded-lg flex items-center justify-center gap-2 hover:bg-lamodaDark transition-colors">
                                <i data-lucide="download" class="w-4 h-4"></i> PDF
                            </button>
                            <button onclick="deleteChecklist('${list.id}')" class="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        // --- ДЕТАЛИ ПРОВЕРКИ ---
        function renderDetails() {
            const list = historyData.find(c => c.id === viewingDetailsId);
            if (!list) return '<div>Ошибка загрузки</div>';

            const score = calculateScore(list.responses);

            let html = `
                <div class="fade-in space-y-6">
                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-100 text-center">
                        <h2 class="text-2xl font-bold italic mb-1">${list.pvzName}</h2>
                        <p class="text-gray-500 mb-4">${list.employeeName} • ${list.date}</p>
                        <div class="inline-block px-6 py-2 bg-white rounded-full shadow-sm border border-gray-200">
                            <span class="text-sm font-bold uppercase text-gray-400 mr-2">Итоговый балл</span>
                            <span class="text-2xl font-bold ${score < 50 ? 'text-red-500' : 'text-green-600'}">${score}%</span>
                        </div>
                    </div>

                    <div class="space-y-6">
            `;

            checklistData.forEach(item => {
                const resp = list.responses[item.id];
                const hasAnswer = resp && resp.answer;
                
                let statusBadge = '';
                if (hasAnswer) {
                    if (resp.answer === 'yes') statusBadge = '<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded">ДА</span>';
                    if (resp.answer === 'no') statusBadge = '<span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-1 rounded">НЕТ</span>';
                    if (resp.answer === 'na') statusBadge = '<span class="bg-gray-200 text-gray-700 text-xs font-bold px-2 py-1 rounded">Н/Д</span>';
                } else {
                    statusBadge = '<span class="bg-gray-100 text-gray-400 text-xs font-bold px-2 py-1 rounded">-</span>';
                }

                html += `
                    <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-lg font-serif text-gray-800 flex-1 mr-4">${item.text}</p>
                            ${statusBadge}
                        </div>
                        
                        ${item.violations ? `
                            <div class="mt-3 pl-4 border-l-2 border-lamoda bg-red-50 p-3 rounded-r-lg">
                                <p class="text-xs font-bold uppercase tracking-widest text-red-600 mb-2">Перечень нарушений:</p>
                                <ul class="space-y-1">
                                    ${item.violations.map((v, i) => `
                                        <li class="text-sm text-red-700 italic">${i + 1}. ${v}</li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${resp?.comment ? `
                            <div class="mt-3 text-sm text-gray-600 italic bg-gray-50 p-2 rounded">
                                "${resp.comment}"
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        }

        // --- ЛОГИКА ---
        function updateMeta(key, value) {
            if (key === 'pvzName') pvzName = value;
            if (key === 'employeeName') employeeName = value;
            saveDraft();
        }

        function setAnswer(itemId, answer) {
            if (!responses[itemId]) responses[itemId] = { answer: null, comment: '' };
            responses[itemId].answer = answer;
            saveDraft();
            render(); 
        }

        function setComment(itemId, text) {
            if (!responses[itemId]) responses[itemId] = { answer: null, comment: '' };
            responses[itemId].comment = text;
            saveDraft();
        }

        function saveChecklist() {
            if (!pvzName || !employeeName) {
                alert('Пожалуйста, заполните название ПВЗ и ФИО сотрудника');
                return;
            }

            const newChecklist = {
                id: Date.now().toString(),
                date: new Date().toLocaleString('ru-RU'),
                pvzName,
                employeeName,
                responses: JSON.parse(JSON.stringify(responses))
            };

            historyData.unshift(newChecklist); 
            localStorage.setItem('lamoda_checklists', JSON.stringify(historyData));
            
            clearDraft();
            currentView = 'history';
            render();
        }

        function deleteChecklist(id) {
            if(confirm('Удалить эту проверку?')) {
                historyData = historyData.filter(c => c.id !== id);
                localStorage.setItem('lamoda_checklists', JSON.stringify(historyData));
                render();
            }
        }

        // --- ГЕНЕРАЦИЯ PDF ---
        function exportPDF(id) {
            const list = historyData.find(c => c.id === id);
            if (!list) return;

            const element = document.createElement('div');
            element.className = 'pdf-content';
            
            const score = calculateScore(list.responses);

            let htmlContent = `
                <div style="font-family: 'Times New Roman', serif; color: #000;">
                    <h1 style="font-size: 24px; font-weight: bold; font-style: italic; margin-bottom: 20px; border-bottom: 2px solid #9cc3ff; padding-bottom: 10px;">Чек-лист проверки ПВЗ</h1>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px;">
                        <div>
                            <strong>ПВЗ:</strong> ${list.pvzName}<br>
                            <strong>Сотрудник:</strong> ${list.employeeName}
                        </div>
                        <div style="text-align: right;">
                            <strong>Дата:</strong> ${list.date}<br>
                            <strong>Результат:</strong> <span style="color: ${score < 50 ? 'red' : 'green'}; font-size: 18px;">${score}%</span>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
            `;

            checklistData.forEach(item => {
                const resp = list.responses[item.id];
                let statusText = '';
                let statusColor = '#000';
                
                if (resp?.answer === 'yes') { statusText = '[ДА]'; statusColor = 'green'; }
                else if (resp?.answer === 'no') { statusText = '[НЕТ]'; statusColor = 'red'; }
                else if (resp?.answer === 'na') { statusText = '[Н/Д]'; statusColor = 'gray'; }
                else { statusText = '[ ]'; }

                htmlContent += `
                    <div class="pdf-item">
                        <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">
                            <span style="color: ${statusColor}; margin-right: 5px;">${statusText}</span>
                            ${item.text}
                        </div>
                `;

                if (item.violations) {
                    htmlContent += `
                        <div style="margin-left: 20px; margin-top: 5px; padding: 8px; background: #fef2f2; border-left: 2px solid #ef4444; border-radius: 0 4px 4px 0;">
                            <p style="font-size: 11px; font-weight: bold; color: #dc2626; margin-bottom: 4px; text-transform: uppercase;">Перечень нарушений:</p>
                            <ul style="font-size: 12px; color: #991b1b; font-style: italic; margin: 0; padding-left: 15px;">
                                ${item.violations.map((v, i) => `<li>${i + 1}. ${v}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                if (resp?.comment) {
                    htmlContent += `<div style="font-size: 13px; color: #555; margin-left: 20px; margin-top: 5px; font-style: italic;">Комментарий: ${resp.comment}</div>`;
                }

                htmlContent += `</div>`;
            });

            htmlContent += `</div></div>`;
            element.innerHTML = htmlContent;

            const opt = {
                margin:       [10, 10, 10, 10],
                filename:     `checklist_${list.pvzName.replace(/[^a-z0-9]/gi, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2,
                    useCORS: true,
                    letterRendering: true
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
            };

            document.body.appendChild(element);
            html2pdf().set(opt).from(element).save().then(() => {
                document.body.removeChild(element);
            });
        }
    </script>
</body>
</html>
